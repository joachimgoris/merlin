# Rootful Podman
services:
  merlin:
    image: ghcr.io/joachimgoris/merlin:latest
    container_name: merlin
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /run/podman/podman.sock:/var/run/podman/podman.sock
      - merlin-data:/app/data
    environment:
      - HOST_ROOT_PATH=/host/root
    restart: unless-stopped
    security_opt:
      - label=disable

# For rootless Podman, change the socket mount to:
# - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/podman/podman.sock

volumes:
  merlin-data:
